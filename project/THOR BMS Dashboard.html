<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THOR — BMS Dashboard Explorations</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared-data.jsx"></script>
<script type="text/babel" src="variant-1-engineering.jsx"></script>
<script type="text/babel" src="variant-2-hud.jsx"></script>
<script type="text/babel" src="variant-3-saas.jsx"></script>
<script type="text/babel" src="variant-4-cluster.jsx"></script>
<script type="text/babel" src="variant-5-terminal.jsx"></script>

<script type="text/babel">
const { useState } = React;

// Per-variant artboard with its own theme toggle overlay
function Artboard({ Component, defaultDark = true, w = 1280, h = 800, name }) {
  const [dark, setDark] = useState(defaultDark);
  return (
    <div style={{ width: '100%', height: '100%', position: 'relative' }}>
      <Component dark={dark} />
      {/* floating theme toggle */}
      <div style={{ position: 'absolute', top: 10, right: 10, zIndex: 10,
        display: 'flex', gap: 1, padding: 2, borderRadius: 999,
        background: 'rgba(128,128,128,.15)', backdropFilter: 'blur(6px)',
        fontFamily: '"JetBrains Mono", monospace', fontSize: 10 }}>
        {['dark', 'light'].map(m => {
          const on = (m === 'dark') === dark;
          return (
            <button key={m} onClick={() => setDark(m === 'dark')}
              style={{ border: 'none', cursor: 'pointer', padding: '4px 10px', borderRadius: 99,
                background: on ? (dark ? '#fff' : '#111') : 'transparent',
                color: on ? (dark ? '#111' : '#fff') : 'inherit',
                fontFamily: 'inherit', fontSize: 10, letterSpacing: 1, textTransform: 'uppercase',
                transition: 'background .15s, color .15s' }}>
              {m}
            </button>
          );
        })}
      </div>
    </div>
  );
}

const W = 1280, H = 800;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="variants" title="THOR · BMS dashboard" subtitle="Five directions for a single-cell real-time monitor. Each artboard has a light/dark toggle; click ⤢ to focus.">
        <DCArtboard id="v1" label="01 · Engineering tool" width={W} height={H}>
          <Artboard Component={V1Engineering} defaultDark={true} />
        </DCArtboard>
        <DCArtboard id="v2" label="02 · Command-center HUD" width={W} height={H}>
          <Artboard Component={V2HUD} defaultDark={true} />
        </DCArtboard>
        <DCArtboard id="v3" label="03 · Modern SaaS" width={W} height={H}>
          <Artboard Component={V3SaaS} defaultDark={false} />
        </DCArtboard>
        <DCArtboard id="v4" label="04 · Instrument cluster" width={W} height={H}>
          <Artboard Component={V4Cluster} defaultDark={true} />
        </DCArtboard>
        <DCArtboard id="v5" label="05 · Brutalist terminal" width={W} height={H}>
          <Artboard Component={V5Terminal} defaultDark={true} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
